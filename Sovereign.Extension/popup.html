<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sovereign AI</title>
  <style>
    body{font-family:Arial,sans-serif;padding:12px;width:320px;background:#0f172a;color:#fff}
    input,select,button{width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid #334155;background:#111827;color:#fff}
    button{background:#60a5fa;color:#0f172a;font-weight:700;cursor:pointer}
    small{color:#94a3b8}
  </style>
</head>
<body>
  <h3>Sovereign AI</h3>
  <small>Configure API + auth for LinkedIn suggestions.</small>
  <input id="apiBaseUrl" placeholder="API Base URL">
  <input id="token" placeholder="JWT token">
  <input id="userId" placeholder="User ID">
  <input id="contactId" placeholder="Default contact ID">
  <select id="relationshipRole">
    <option>Peer</option>
    <option>Investor</option>
    <option>Lead</option>
    <option>Mentor</option>
    <option>Friend</option>
  </select>
  <button id="save">Save settings</button>
  <pre id="output"></pre>
  <script src="popup.js"></script>
</body>
</html>
