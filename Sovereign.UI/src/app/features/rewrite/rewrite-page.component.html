<section class="hero">
  <h1>Rewrite important messages</h1>
  <p>Generate three calibrated variants through <code>POST /api/ai/rewrite</code>.</p>
</section>

<section class="grid two">
  <div class="card stack">
    <div class="field"><label>User ID</label><input [(ngModel)]="form.userId"></div>
    <div class="field"><label>Contact ID</label><input [(ngModel)]="form.contactId"></div>

    <div class="row">
      <div class="field">
        <label>Relationship role</label>
        <select [(ngModel)]="form.relationshipRole">
          <option *ngFor="let x of roles" [value]="x">{{ x }}</option>
        </select>
      </div>

      <div class="field">
        <label>Goal</label>
        <select [(ngModel)]="form.goal">
          <option *ngFor="let x of goals" [value]="x">{{ x }}</option>
        </select>
      </div>

      <div class="field">
        <label>Platform</label>
        <select [(ngModel)]="form.platform">
          <option *ngFor="let x of platforms" [value]="x">{{ x }}</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Draft</label>
      <textarea [(ngModel)]="form.draft"></textarea>
    </div>

    <div class="row">
      <button class="btn" (click)="submit()" [disabled]="facade.loading()">Generate 3 variants</button>
      <button class="btn secondary" (click)="reset()">Reset</button>
    </div>

    <div class="muted" *ngIf="facade.error()">{{ facade.error() }}</div>
  </div>

  <div class="card stack">
    <h3>Variants</h3>
    <div class="empty" *ngIf="!facade.loading() && !facade.variants().length">No rewrites yet.</div>
    <div class="muted" *ngIf="facade.loading()">Generating rewrites...</div>

    <div class="stack" *ngIf="facade.variants().length">
      <div class="card" *ngFor="let variant of facade.variants()">
        <div class="row" style="justify-content:space-between">
          <strong>{{ variant.stance }}</strong>
          <button class="btn ghost" (click)="copy(variant.message)">Copy</button>
        </div>
        <div class="result">{{ variant.message }}</div>
      </div>
    </div>
  </div>
</section>
