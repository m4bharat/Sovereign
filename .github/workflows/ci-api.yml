name: CI-API

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'Sovereign.API/**'
      - 'Sovereign.Application/**'
      - 'Sovereign.Domain/**'
      - 'Sovereign.Infrastructure/**'
      - 'Sovereign.Intelligence/**'
      - 'Sovereign.Contracts/**'
      - 'Sovereign.Shared/**'
      - 'Sovereign.API.Tests/**'
      - 'Sovereign.API.IntegrationTests/**'
      - 'Sovereign.sln'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'Sovereign.API/**'
      - 'Sovereign.Application/**'
      - 'Sovereign.Domain/**'
      - 'Sovereign.Infrastructure/**'
      - 'Sovereign.Intelligence/**'
      - 'Sovereign.Contracts/**'
      - 'Sovereign.Shared/**'
      - 'Sovereign.API.Tests/**'
      - 'Sovereign.API.IntegrationTests/**'
      - 'Sovereign.sln'
      - '.github/workflows/ci-api.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Sovereign.sln

      - name: Build
        run: dotnet build Sovereign.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Sovereign.sln --no-build --configuration Release --verbosity normal