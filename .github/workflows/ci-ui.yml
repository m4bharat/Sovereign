name: CI-UI

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'Sovereign.UI/**'
      - '.github/workflows/ci-ui.yml'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'Sovereign.UI/**'
      - '.github/workflows/ci-ui.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-ui:
    name: Build and Test UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Sovereign.UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Sovereign.UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present